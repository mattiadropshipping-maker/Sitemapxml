# Configuración de Netlify para GEO Marketing IA
# Asegura MIME types correctos y redirecciones para SPA

[build]
  publish = "dist"
  command = "npm run build"

# Headers para MIME types correctos (CRÍTICO para SEO/GEO)
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Headers de seguridad generales
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirects para SPA (React Router)
# Los archivos estáticos tienen prioridad, luego React Router maneja el resto
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # No aplicar a archivos estáticos
  conditions = {path = "!=/sitemap.xml", path = "!=/robots.txt"}
